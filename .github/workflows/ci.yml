name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # NOTE: If you change this list, update package.json/"scripts"/"ci" as well
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npm run format:check
      - run: npm run lint
      - run: npm run test
